<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>El Sueño de Ari</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rose:    #f06292;
  --rose-lt: #fce4ec;
  --rose-dk: #c2185b;
  --lav:     #9575cd;
  --lav-lt:  #ede7f6;
  --mint:    #4db6ac;
  --mint-lt: #e0f2f1;
  --sky:     #64b5f6;
  --sky-lt:  #e3f2fd;
  --ink:     #37274a;
  --muted:   #8e7ea4;
  --card:    #ffffff;
  --bg:      #fdf4f9;
  --shadow:  0 4px 18px rgba(192,110,152,0.13);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  padding: 28px 16px 48px;
  background-image:
    radial-gradient(circle at 10% 20%, #fce4ec88 0%, transparent 45%),
    radial-gradient(circle at 90% 80%, #ede7f688 0%, transparent 45%);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8em, 6vw, 2.6em);
  color: var(--rose-dk);
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.subtitulo {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 26px;
  font-style: italic;
}

.contenedor {
  background: var(--card);
  padding: 24px 22px 28px;
  border-radius: 22px;
  box-shadow: var(--shadow);
  max-width: 460px;
  margin: auto;
}

/* ── Campos ── */
.campo {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 14px 0;
}
.campo label {
  font-weight: 700;
  font-size: 14px;
  color: var(--ink);
  flex: 1;
}

input[type=time] {
  padding: 10px 14px;
  font-size: 15px;
  font-family: 'Nunito', sans-serif;
  border-radius: 12px;
  border: 2px solid #e8d5ee;
  background: #fff9fd;
  color: var(--ink);
  width: 130px;
  transition: border-color .2s;
}
input[type=time]:focus { outline: none; border-color: var(--rose); }

/* toggle switch */
.switch-wrap { display: flex; align-items: center; gap: 10px; }
.switch {
  position: relative; width: 48px; height: 26px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: #ddd; border-radius: 26px;
  cursor: pointer; transition: background .25s;
}
.slider::before {
  content: '';
  position: absolute; width: 20px; height: 20px;
  left: 3px; top: 3px;
  background: white; border-radius: 50%;
  transition: transform .25s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.switch input:checked + .slider { background: var(--mint); }
.switch input:checked + .slider::before { transform: translateX(22px); }
.switch-lbl { font-size: 13px; color: var(--muted); font-weight: 600; }

/* botón principal */
.btn-calc {
  display: block;
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--rose), var(--lav));
  color: white;
  cursor: pointer;
  letter-spacing: .3px;
  transition: opacity .2s, transform .1s;
  box-shadow: 0 4px 14px rgba(192,110,152,.35);
}
.btn-calc:hover { opacity: .9; }
.btn-calc:active { transform: scale(.98); }

/* pestañas de opciones */
.tabs {
  display: flex; gap: 8px;
  margin: 20px 0 14px;
}
.tab {
  flex: 1; padding: 9px 6px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  border: 2px solid #e0d0ea;
  border-radius: 12px;
  background: #faf5ff;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
.tab.activa {
  background: var(--rose-lt);
  border-color: var(--rose);
  color: var(--rose-dk);
}

/* tarjetas de siesta */
.siesta-card {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--rose-lt);
  border-left: 4px solid var(--rose);
  padding: 12px 14px;
  border-radius: 12px;
  margin: 8px 0;
  animation: fadeUp .3s ease both;
}
.siesta-num {
  background: var(--rose);
  color: white;
  font-size: 12px; font-weight: 700;
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.siesta-info .hora { font-size: 16px; font-weight: 700; color: var(--rose-dk); }
.siesta-info .detalle { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }

/* tarjeta dormir */
.dormir-card {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--lav-lt);
  border-left: 4px solid var(--lav);
  padding: 12px 14px;
  border-radius: 12px;
  margin: 14px 0 4px;
  animation: fadeUp .3s ease both;
}
.dormir-icon {
  font-size: 22px; line-height: 1;
  flex-shrink: 0; margin-top: 1px;
}
.dormir-info .hora { font-size: 17px; font-weight: 700; color: var(--lav); }
.dormir-info .detalle { font-size: 12px; color: #7c6faa; margin-top: 2px; }

/* aviso sin siestas */
.aviso {
  background: var(--sky-lt);
  border-left: 4px solid var(--sky);
  border-radius: 12px;
  padding: 12px 14px;
  color: #1e6fa8;
  font-size: 13px;
  font-weight: 600;
  margin: 10px 0;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.divider {
  height: 1px; background: #f0e6f6;
  margin: 20px 0 4px;
}
</style>
</head>
<body>

<h1>✨ El Sueño de Ari</h1>
<p class="subtitulo">Planificador de siestas para bebé</p>

<div class="contenedor">

  <div class="campo">
    <label>Hora último despertar</label>
    <input type="time" id="ultima" value="07:00">
  </div>

  <div class="campo">
    <label>¿Es el inicio del día?</label>
    <div class="switch-wrap">
      <label class="switch">
        <input type="checkbox" id="inicioDia">
        <span class="slider"></span>
      </label>
      <span class="switch-lbl" id="switchLbl">No</span>
    </div>
  </div>

  <button class="btn-calc" onclick="calcular()">Generar día ✦</button>

  <div id="resultado"></div>
</div>

<script>
// ── Actualizar etiqueta del toggle ──────────────────────────
document.getElementById('inicioDia').addEventListener('change', function(){
  document.getElementById('switchLbl').textContent = this.checked ? 'Sí' : 'No';
});

// ── Formatear minutos → "H:MM" ──────────────────────────────
function fmt(min) {
  const h = Math.floor(min / 60) % 24;
  const m = min % 60;
  return h + ':' + (m < 10 ? '0' : '') + m;
}

// ── Parámetros globales ─────────────────────────────────────
const P = {
  ventanaPrimera: 60,   // ventana mínima tras el primer despertar del día
  ventanaMin:     75,   // ventana mínima entre siestas (resto del día)
  ventanaMax:    120,   // ventana máxima permitida entre siestas
  ventanaNoche:   90,   // ventana ideal antes de dormir por la noche
  durMin:         25,   // duración mínima siesta
  durMax:         50,   // duración máxima siesta (aprox.)
  ultimoInicioS: 17*60+30, // última hora a la que puede COMENZAR una siesta
  dormirMin:     19*60,     // hora mínima de acostarse por la noche
  dormirMax:     20*60,     // hora máxima de acostarse por la noche
};

// ── Genera una secuencia de siestas a partir de un despertar ─
// Devuelve null si no puede cerrar el día correctamente.
function generarSecuencia(despertar, esPrimera, offset) {
  // offset: variación opcional para generar alternativas (en minutos)
  offset = offset || 0;

  let t = despertar;
  let siestas = [];
  let numSiesta = 0;

  while (true) {
    numSiesta++;
    // Ventana de espera antes de esta siesta
    const ventanaBase = (numSiesta === 1 && esPrimera)
      ? P.ventanaPrimera
      : P.ventanaMin + offset;

    const inicioSiesta = t + ventanaBase;

    // ¿Aún podemos empezar una siesta a tiempo?
    if (inicioSiesta > P.ultimoInicioS) break;

    // ¿Si después de esta siesta + ventana noche podemos dormir a tiempo?
    const durSiesta = Math.round((P.durMin + P.durMax) / 2); // duración estimada media
    const despertarTras = inicioSiesta + durSiesta;
    const dormirTras = despertarTras + P.ventanaNoche;

    // Si ya no podemos dormir dentro del rango → no añadimos más siestas
    if (dormirTras > P.dormirMax + 15) break;

    // Duración real (ligera variación decorativa, fija por índice para reproducibilidad)
    const dur = P.durMin + ((numSiesta * 7 + offset) % (P.durMax - P.durMin + 1));
    const despertar2 = inicioSiesta + dur;
    const vReal = inicioSiesta - t;

    siestas.push({ inicio: inicioSiesta, dur, despertar: despertar2, ventana: vReal });
    t = despertar2;

    // Si con la siguiente ventana ya no cabe otra siesta, paramos
    const sigInicio = t + P.ventanaMin;
    if (sigInicio > P.ultimoInicioS) break;
  }

  // Calcular hora de dormir
  const ultimoDespertar = siestas.length > 0 ? siestas[siestas.length-1].despertar : despertar;
  let dormir = ultimoDespertar + P.ventanaNoche;
  if (dormir < P.dormirMin) dormir = P.dormirMin;
  if (dormir > P.dormirMax) dormir = P.dormirMax;
  const ventanaFinal = dormir - ultimoDespertar;

  return { siestas, dormir, ventanaFinal };
}

// ── Renderiza una secuencia como HTML ───────────────────────
function renderSecuencia(seq) {
  if (seq.siestas.length === 0) {
    return `<div class="aviso">🌙 Con este horario no caben siestas. Hora de dormir: <strong>${fmt(seq.dormir)}</strong></div>`;
  }

  let html = '';
  seq.siestas.forEach((s, i) => {
    html += `<div class="siesta-card">
      <div class="siesta-num">${i+1}</div>
      <div class="siesta-info">
        <div class="hora">Siesta ${i+1}: ${fmt(s.inicio)}</div>
        <div class="detalle">
          Ventana: ${s.ventana} min &nbsp;·&nbsp;
          Duración aprox: ${s.dur} min &nbsp;·&nbsp;
          Despertar: ~${fmt(s.despertar)}
        </div>
      </div>
    </div>`;
  });

  html += `<div class="dormir-card">
    <div class="dormir-icon">🌙</div>
    <div class="dormir-info">
      <div class="hora">Hora de dormir: ${fmt(seq.dormir)}</div>
      <div class="detalle">Ventana final: ${seq.ventanaFinal} min · ${seq.siestas.length} siesta${seq.siestas.length!==1?'s':''}</div>
    </div>
  </div>`;

  return html;
}

// ── Cálculo principal ───────────────────────────────────────
function calcular() {
  const val = document.getElementById('ultima').value;
  if (!val) { alert('Introduce la hora del último despertar'); return; }
  const [h, m] = val.split(':').map(Number);
  const despertar = h * 60 + m;
  const esPrimera = document.getElementById('inicioDia').checked;

  const seqA = generarSecuencia(despertar, esPrimera, 0);
  const seqB = generarSecuencia(despertar, esPrimera, 10); // variante con ventanas un poco más largas

  // ¿Son realmente distintas?
  const distintas = seqA.siestas.length !== seqB.siestas.length
    || seqA.dormir !== seqB.dormir
    || (seqA.siestas.length > 0 && seqB.siestas.length > 0 &&
        seqA.siestas[0].inicio !== seqB.siestas[0].inicio);

  let out = '';

  if (distintas) {
    out += `<div class="tabs">
      <button class="tab activa" id="tabA" onclick="verTab('A')">Opción A &mdash; ${seqA.siestas.length} siesta${seqA.siestas.length!==1?'s':''}</button>
      <button class="tab" id="tabB" onclick="verTab('B')">Opción B &mdash; ${seqB.siestas.length} siesta${seqB.siestas.length!==1?'s':''}</button>
    </div>
    <div id="panelA">${renderSecuencia(seqA)}</div>
    <div id="panelB" style="display:none">${renderSecuencia(seqB)}</div>`;
  } else {
    // Una sola opción
    out += `<div class="divider"></div>${renderSecuencia(seqA)}`;
  }

  document.getElementById('resultado').innerHTML = out;
}

function verTab(cual) {
  document.getElementById('panelA').style.display = cual === 'A' ? '' : 'none';
  document.getElementById('panelB').style.display = cual === 'B' ? '' : 'none';
  document.getElementById('tabA').className = 'tab' + (cual === 'A' ? ' activa' : '');
  document.getElementById('tabB').className = 'tab' + (cual === 'B' ? ' activa' : '');
}
</script>

</body>
</html>
