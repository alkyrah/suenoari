<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Siestas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#ffd6e8,#d6f0ff);
  min-height:100vh;
}

h1{
  font-family:'Dancing Script', cursive;
  font-size:2.5em;
  color:#ff6c9a;
  text-shadow:2px 2px 5px #ffd6e8;
  margin-bottom:20px;
}

.contenedor{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  max-width:450px;
  margin:auto;
}

input,button{
  width:80%;
  padding:12px;
  margin:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#ff8fb3;
  color:white;
  border:none;
  font-weight:bold;
}

.fila{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin:10px 0;
}

.fila label{
  font-weight:bold;
}

#inicioDiaBtn{
  width:auto;
  padding:6px 12px;
  font-size:14px;
  background:#ccc;
  color:white;
  margin:0;
}

#inicioDiaBtn.activo{
  background:#6ccf8f;
}

.tarjeta{
  background:#fff;
  padding:12px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.siesta{color:#ff6c9a;font-weight:bold;}
.dormir{color:#5c6cff;font-weight:bold;font-size:18px;}
.ventana{color:#888;font-size:14px;}
</style>
</head
