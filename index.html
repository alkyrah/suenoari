<!DOCTYPE html>
<html lang="es">
<head>
<head>
<head>
<meta charset="UTF-8">
<title>Calculadora de Siestas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font Dancing Script -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#ffd6e8,#d6f0ff);
  min-height:100vh;
}

h1{
  font-family: 'Dancing Script', cursive; /* fuente Dancing Script */
  font-size:2.5em;                         /* tamaño grande */
  color:#ff6c9a;                         /* color rosa */
  text-shadow: 2px 2px 5px #ffd6e8;      /* sombra suave */
  margin-bottom:20px;
}

.contenedor{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  max-width:450px;
  margin:auto;
}

input,button{
  width:80%;
  padding:12px;
  margin:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#ff8fb3;
  color:white;
  border:none;
  font-weight:bold;
}

.tarjeta{
  background:#fff;
  padding:12px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.siesta{color:#ff6c9a;font-weight:bold;}
.dormir{color:#5c6cff;font-weight:bold;font-size:18px;}
</style>
</head>
<body>
<h1>⭐ El Sueño de Ari ⭐</h1>
<div class="contenedor">
<label>Hora último despertar</label><br>
<input type="time" id="ultima">
<br>
<button onclick="calcular()">Generar día</button>
<div id="resultado"></div>
</div>

<script>
function formatoHora(min){
  let h=Math.floor(min/60);
  let m=min%60;
  if(m<10)m="0"+m;
  return h+":"+m;
}

function calcular(){
  let ultima=document.getElementById("ultima").value;
  if(!ultima){alert("Introduce la hora"); return;}
  
  let partes=ultima.split(":");
  let despertar=parseInt(partes[0])*60 + parseInt(partes[1]);
  
  let html="";
  let siesta=1;
  const ultimoMin=17*60+40; // 17:40
  const rangoUltimo=17*60+20; // 17:20
  
  while(true){
    let inicio;
    // Si es la primera siesta del día y el despertar está entre 6:00 y 8:00
    if(siesta===1 && despertar>=6*60 && despertar<=8*60){
      inicio=despertar+90; // 1:30 después del despertar
    } else {
      inicio=despertar+120; // regla general: max 2h despierto
    }
    
    if(inicio>ultimoMin) break; // no cabe otra siesta
    
    let duracion=30+Math.floor(Math.random()*21); // 30-50 min
    let proximoDespertar=inicio+duracion;
    
    // Ajuste última siesta
    if(proximoDespertar>ultimoMin){
      duracion=ultimoMin-inicio;
      proximoDespertar=inicio+duracion;
      if(duracion<30) break; // si no alcanza 30 min, no generamos
    }
    
    html+="<div class='tarjeta'>";
    html+="<div class='siesta'>Siesta "+siesta+": "+formatoHora(inicio)+"</div>";
    html+="<div>Duración aprox: "+duracion+" min</div>";
    html+="<div>Despertar aprox: "+formatoHora(proximoDespertar)+"</div>";
    html+="</div>";
    
    despertar=proximoDespertar;
    siesta++;
    
    if(proximoDespertar>=rangoUltimo) break;
  }
  
  // Hora de dormir entre 19:00 y 20:00
  let dormir=despertar+120;
  if(dormir<19*60) dormir=19*60;
  if(dormir>20*60) dormir=20*60;
  
  html+="<div class='tarjeta dormir'>🌙 Hora de dormir: "+formatoHora(dormir)+"</div>";
  
  document.getElementById("resultado").innerHTML=html;
}
</script>
</body>
</html>
