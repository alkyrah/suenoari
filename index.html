<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora de Siestas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#ffd6e8,#d6f0ff);
  min-height:100vh;
}

h1{
  font-family:'Dancing Script', cursive;
  font-size:2.5em;
  color:#ff6c9a;
  text-shadow:2px 2px 5px #ffd6e8;
  margin-bottom:20px;
}

.contenedor{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  max-width:450px;
  margin:auto;
}

input,button{
  width:80%;
  padding:12px;
  margin:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#ff8fb3;
  color:white;
  border:none;
  font-weight:bold;
}

.fila{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin:10px 0;
}

.fila label{
  font-weight:bold;
}

#inicioDiaBtn{
  width:auto;
  padding:6px 12px;
  font-size:14px;
  background:#ccc;
  color:white;
  margin:0;
}

#inicioDiaBtn.activo{
  background:#6ccf8f;
}

.tarjeta{
  background:#fff;
  padding:12px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.siesta{color:#ff6c9a;font-weight:bold;}
.dormir{color:#5c6cff;font-weight:bold;font-size:18px;}
.ventana{color:#888;font-size:14px;}
</style>
</head>

<body>
<h1>⭐ El Sueño de Ari ⭐</h1>

<div class="contenedor">

<label>Hora último despertar</label><br>
<input type="time" id="ultima">

<div class="fila">
  <label>Inicio del día</label>
  <button id="inicioDiaBtn" onclick="toggleInicioDia()">No</button>
</div>

<button onclick="calcular()">Generar día</button>

<div id="resultado"></div>
</div>

<script>
function formatoHora(min){
  let h=Math.floor(min/60);
  let m=min%60;
  if(m<10) m="0"+m;
  return h + ":" + m;
}

let inicioDiaActivo = false;

function toggleInicioDia(){
  inicioDiaActivo = !inicioDiaActivo;
  const btn = document.getElementById("inicioDiaBtn");
  
  if(inicioDiaActivo){
    btn.classList.add("activo");
    btn.innerText = "Sí";
  } else {
    btn.classList.remove("activo");
    btn.innerText = "No";
  }
}

// Función para generar siestas
function generarSiestas(despertar, numeroSiestas){
  const ultimoMin = 17*60 + 40; // 17:40 máximo
  const dormirMin = 19*60; // 19:00 mínimo
  let html = "";

  // Calculamos tiempo disponible desde despertar hasta último límite
  let tiempoDisponible = ultimoMin - despertar;
  
  // Distribuimos ventanas y siestas uniformemente
  let duracionSiestaMin = 30; // mínimo 30 min
  let ventanaPromedio = Math.floor((tiempoDisponible - (duracionSiestaMin*numeroSiestas)) / numeroSiestas);
  if(ventanaPromedio < 0) ventanaPromedio = 0; // evitar negativo

  let tempDespertar = despertar;

  for(let i=1; i<=numeroSiestas; i++){
    // Primera siesta y botón activado
    let inicio;
    if(i===1 && inicioDiaActivo && tempDespertar>=6*60 && tempDespertar<=9*60){
      inicio = tempDespertar + 90;
    } else {
      inicio = tempDespertar + ventanaPromedio;
    }

    // Duración aleatoria
    let duracion = 30 + Math.floor(Math.random()*21);
    // Ajuste para no pasarse
    if(inicio + duracion > ultimoMin){
      duracion = ultimoMin - inicio;
      if(duracion < 30) duracion = 30; // forzar mínimo
    }

    let proximoDespertar = inicio + duracion;
    let ventana = inicio - tempDespertar;

    html += "<div class='tarjeta'>";
    html += "<div class='siesta'>Siesta "+i+": "+formatoHora(inicio)+"</div>";
    html += "<div class='ventana'>Ventana: "+ventana+" min</div>";
    html += "<div>Duración aprox: "+duracion+" min</div>";
    html += "<div>Despertar aprox: "+formatoHora(proximoDespertar)+"</div>";
    html += "</div>";

    tempDespertar = proximoDespertar;
  }

  // Ventana final antes de dormir
  let dormir = tempDespertar + 120;
  if(dormir < 19*60) dormir = 19*60;
  if(dormir > 20*60) dormir = 20*60;
  let ventanaFinal = dormir - tempDespertar;

  html += "<div class='tarjeta dormir'>";
  html += "🌙 Hora de dormir: "+formatoHora(dormir)+"<br>";
  html += "Ventana final: "+ventanaFinal+" min";
  html += "</div>";

  return html;
}

function calcular(){
  let ultima = document.getElementById("ultima").value;
  if(!ultima){alert("Introduce la hora"); return;}

  let partes = ultima.split(":");
  let despertar = parseInt(partes[0])*60 + parseInt(partes[1]);

  let html = "<h3>Opciones generadas</h3>";

  // Opción 3 siestas
  let opcion3 = generarSiestas(despertar, 3);
  html += "<h4>3 Siestas</h4>" + opcion3;

  // Opción 4 siestas (solo si cabe)
  let horaFinal = 17*60 + 40; 
  if(despertar + (horaFinal - despertar)/4*4 <= horaFinal){ 
    let opcion4 = generarSiestas(despertar, 4);
    html += "<h4>4 Siestas</h4>" + opcion4;
  }

  document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
